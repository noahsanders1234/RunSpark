<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon — RunSpark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --sky: #eaf6ff;
    --blue: #4fb8f0;
    --blue-dark: #2196d6;
    --navy: #1a2b3c;
    --gray: #6b7a8d;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, var(--sky) 0%, var(--white) 55%);
    color: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }

  .spark {
    font-size: 46px;
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  p {
    color: var(--gray);
    font-size: 15px;
    max-width: 360px;
    margin-bottom: 26px;
  }

  a.back-btn {
    text-decoration: none;
    background: linear-gradient(135deg, var(--blue), var(--blue-dark));
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 12px 24px;
    border-radius: 10px;
  }

  a.back-btn:hover {
    box-shadow: 0 6px 18px rgba(79, 184, 240, 0.4);
  }
</style>
</head>
<body>
  <div class="spark">⚡</div>
  <h1>This part of RunSpark is still being built.</h1>
  <p>We're working on it! Check back soon — for now, head back to your Dashboard.</p>
  <a class="back-btn" href="dashboard.html">Back to Dashboard</a>
</body>
</html>
