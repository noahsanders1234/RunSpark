<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — RunSpark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --sky: #eaf6ff;
    --blue: #4fb8f0;
    --blue-dark: #2196d6;
    --navy: #1a2b3c;
    --gray: #6b7a8d;
    --error: #e0554f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(180deg, var(--sky) 0%, var(--white) 55%);
    color: var(--navy);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  header .logo-mark {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--blue), var(--blue-dark));
  }

  header .logo-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--navy);
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 20px;
  }

  .card {
    background: var(--white);
    width: 100%;
    max-width: 400px;
    border-radius: 20px;
    padding: 36px 32px;
    box-shadow: 0 10px 40px rgba(79, 184, 240, 0.18);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: -60px;
    right: -60px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: conic-gradient(from 200deg, var(--blue), transparent 60%);
    opacity: 0.15;
  }

  .card h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 6px;
    position: relative;
  }

  .card p.subtitle {
    color: var(--gray);
    font-size: 14px;
    margin-bottom: 28px;
    position: relative;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
  }

  label {
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 6px;
    display: block;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #dfeefb;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--navy);
    background: var(--sky);
    transition: border-color 0.15s ease;
  }

  input:focus {
    outline: none;
    border-color: var(--blue);
    background: var(--white);
  }

  .field-error {
    font-size: 12px;
    color: var(--error);
    min-height: 16px;
    margin-top: 4px;
  }

  .forgot-link {
    text-align: right;
    margin-top: -8px;
  }

  .forgot-link a {
    font-size: 13px;
    color: var(--blue-dark);
    text-decoration: none;
    font-weight: 500;
  }

  .forgot-link a:hover {
    text-decoration: underline;
  }

  .submit-btn {
    margin-top: 8px;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--blue), var(--blue-dark));
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.15s ease;
  }

  .submit-btn:hover {
    box-shadow: 0 6px 18px rgba(79, 184, 240, 0.4);
    transform: translateY(-1px);
  }

  .switch-link {
    text-align: center;
    font-size: 14px;
    color: var(--gray);
    margin-top: 22px;
    position: relative;
  }

  .switch-link a {
    color: var(--blue-dark);
    font-weight: 600;
    text-decoration: none;
  }

  .switch-link a:hover {
    text-decoration: underline;
  }

  footer {
    padding: 20px;
    font-size: 12px;
    color: var(--gray);
  }

  @media (max-width: 480px) {
    .card { padding: 28px 22px; border-radius: 16px; }
    .card h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark"></div>
  <div class="logo-text">RunSpark</div>
</header>

<main>
  <div class="card">
    <h1>Welcome back.</h1>
    <p class="subtitle">Log in to keep your streak going and see what your clubs are up to.</p>

    <form id="loginForm" novalidate>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
        <div class="field-error" id="emailError"></div>
      </div>

      <div>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required>
        <div class="field-error" id="passwordError"></div>
        <div class="forgot-link"><a href="#">Forgot password?</a></div>
      </div>

      <button type="submit" class="submit-btn">Log in</button>
    </form>

    <div class="switch-link">
      New to RunSpark? <a href="signup.html">Create an account</a>
    </div>
  </div>
</main>

<footer>© 2026 RunSpark. Run together.</footer>

<script>
  const form = document.getElementById('loginForm');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    let valid = true;

    const email = document.getElementById('email');
    const password = document.getElementById('password');

    document.getElementById('emailError').textContent = '';
    document.getElementById('passwordError').textContent = '';

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email.value.trim())) {
      document.getElementById('emailError').textContent = 'Please enter a valid email.';
      valid = false;
    }

    if (password.value.length === 0) {
      document.getElementById('passwordError').textContent = 'Please enter your password.';
      valid = false;
    }

    if (valid) {
      // No real backend yet, so we save login state right in the browser.
      // Later, this will check a real account on a server instead.
      localStorage.setItem('runspark_loggedIn', 'true');
      window.location.href = 'dashboard.html';
    }
  });
</script>

</body>
</html>
